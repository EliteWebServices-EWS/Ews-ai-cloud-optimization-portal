AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EWS Portal API - Lambda, HTTP API Gateway, DynamoDB, Cognito, EventBridge

Parameters:
  CorsOrigin:
    Type: String
    Default: "https://elitewebservices-ews.github.io"
    Description: Allowed CORS origin for API Gateway

  EnableAwsSync:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set to true to enable live AWS sync via STS AssumeRole

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TENANTS_TABLE:   !Ref TenantsTable
        CORS_ORIGIN:     !Ref CorsOrigin
        ENABLE_AWS_SYNC: !Ref EnableAwsSync
        USER_POOL_ID:    !Ref EWSUserPool

Resources:

  TenantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ews-portal-tenants
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  EWSUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ews-portal-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: allowed_clients
          AttributeDataType: String
          Required: false
          Mutable: true

  EWSUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: ews-portal-client
      UserPoolId: !Ref EWSUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 8
      IdTokenValidity: 8
      RefreshTokenValidity: 30

  # HTTP API — 71% cheaper than REST API ($1.00 vs $3.50 per million requests)
  EWSPortalApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod
      Description: EWS Portal HTTP API
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - !Ref CorsOrigin
        MaxAge: 300
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${EWSUserPool}"
              audience:
                - !Ref EWSUserPoolClient
        DefaultAuthorizer: CognitoAuthorizer

  EWSPortalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ews-portal-api
      Handler: src/handler.handler
      CodeUri: .
      Description: EWS Portal main Lambda handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantsTable
        - Statement:
            Effect: Allow
            Action:
              - sts:AssumeRole
              - cognito-idp:AdminGetUser
              - cognito-idp:ListUsers
            Resource: "*"
      Events:
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref EWSPortalApi
            Path: /v1/health
            Method: GET
            Auth:
              Authorizer: NONE

        ListClients:
          Type: HttpApi
          Properties:
            ApiId: !Ref EWSPortalApi
            Path: /v1/clients
            Method: GET

        GetDashboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref EWSPortalApi
            Path: /v1/dashboard/{clientId}
            Method: GET

        SyncClient:
          Type: HttpApi
          Properties:
            ApiId: !Ref EWSPortalApi
            Path: /v1/clients/{clientId}/sync
            Method: POST

        AuthMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref EWSPortalApi
            Path: /v1/auth/me
            Method: GET

  SyncScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ews-portal-sync-schedule
      Description: Auto-sync all active client dashboards every 6 hours
      ScheduleExpression: "rate(6 hours)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt EWSPortalFunction.Arn
          Id: ScheduledSync
          Input: '{"source":"eventbridge","action":"syncAll"}'

  SyncSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EWSPortalFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SyncScheduleRule.Arn

Outputs:
  ApiUrl:
    Description: Live API base URL
    Value: !Sub "https://${EWSPortalApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref EWSUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref EWSUserPoolClient

  TenantsTableName:
    Description: DynamoDB table name
    Value: !Ref TenantsTable
