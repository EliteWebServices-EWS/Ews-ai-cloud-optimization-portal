<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWS AI Cloud Optimization Portal</title>
    <link rel="icon" href="../assets/logo/ews-logo-primary.png">
    <link rel="stylesheet" href="../styles/brand-colors.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--ews-black-soft, #0A0A0A);
            color: var(--ews-white, #fff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .portal-header {
            background: #000;
            border-bottom: 1px solid var(--ews-gray-700, #2A2A2A);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .portal-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: inherit;
        }
        .portal-brand img { width: 36px; height: 36px; border-radius: 6px; }
        .portal-brand span { font-weight: 700; font-size: 0.95rem; letter-spacing: -0.01em; }
        .portal-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ews-gold, #DBAC18);
            border: 1px solid rgba(219,172,24,0.3);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }
        .portal-header-actions { display: flex; align-items: center; gap: 1rem; }
        .portal-header-actions a {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ews-gray-300, #A3A3A3);
            text-decoration: none;
        }
        .portal-header-actions a:hover { color: var(--ews-gold, #DBAC18); }
        .portal-logout {
            background: var(--ews-gray-900, #1A1A1A);
            border: 1px solid var(--ews-gray-700, #2A2A2A);
            color: var(--ews-white, #fff);
            font-size: 0.75rem;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Layout */
        .portal-layout { display: flex; flex: 1; overflow: hidden; }
        .portal-sidebar {
            width: 220px;
            background: #000;
            border-right: 1px solid var(--ews-gray-700, #2A2A2A);
            padding: 1rem;
            display: none;
        }
        @media (min-width: 768px) { .portal-sidebar { display: block; } }
        .portal-sidebar a {
            display: block;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ews-gray-300, #A3A3A3);
            text-decoration: none;
            margin-bottom: 0.35rem;
            transition: background 0.15s, color 0.15s;
        }
        .portal-sidebar a.active,
        .portal-sidebar a:hover {
            background: var(--ews-gray-900, #1A1A1A);
            color: var(--ews-gold, #DBAC18);
        }

        /* Main content */
        .portal-main { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; }
        .portal-main-inner { max-width: 1100px; margin: 0 auto; }
        .portal-main h2 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.25rem; }

        /* Toolbar row: client selector + sync button + meta */
        .portal-toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .portal-client-select {
            background: var(--ews-gray-900, #1A1A1A);
            border: 1px solid var(--ews-gray-700, #2A2A2A);
            color: var(--ews-white, #fff);
            font-size: 0.85rem;
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            min-width: 200px;
        }
        .portal-sync-btn {
            background: var(--ews-gold, #DBAC18);
            color: #000;
            border: none;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.55rem 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .portal-sync-btn:hover { background: var(--ews-gold-light, #F4C73E); transform: translateY(-1px); }
        .portal-sync-btn:active { transform: translateY(0); }
        #portal-meta { display: flex; align-items: center; font-size: 0.8rem; }
        #portal-sync-status {
            font-size: 0.75rem;
            color: var(--ews-gray-300, #A3A3A3);
            min-width: 180px;
        }

        /* Section labels */
        .portal-section-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ews-gray-300, #A3A3A3);
            margin: 2rem 0 1rem;
        }
        .portal-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--ews-gray-700, #2A2A2A);
        }

        /* Data refresh note */
        .portal-refresh-note {
            text-align: center;
            font-size: 0.72rem;
            color: var(--ews-gray-700, #3A3A3A);
            margin-top: 2.5rem;
            padding-bottom: 1rem;
        }
    </style>
</head>
<body>

    <header class="portal-header">
        <a href="../index.html" class="portal-brand">
            <img src="../assets/logo/ews-logo-primary.png" alt="EWS">
            <span>Elite Web Services</span>
            <span class="portal-badge">Portal</span>
        </a>
        <div class="portal-header-actions">
            <a href="../index.html">&larr; Back to Site</a>
            <button class="portal-logout" type="button">Sign Out</button>
        </div>
    </header>

    <div class="portal-layout">
        <aside class="portal-sidebar">
            <a href="#overview" class="active">Overview</a>
            <a href="#cost">Cost Analysis</a>
            <a href="#security">Security</a>
            <a href="#resources">Resources</a>
            <a href="#insights">Insights</a>
        </aside>

        <main class="portal-main">
            <div class="portal-main-inner">

                <!-- Page heading -->
                <div id="overview">
                    <h2>Cloud Architecture Overview</h2>
                </div>

                <!-- Toolbar: client selector + sync + dataSource badge -->
                <div class="portal-toolbar">
                    <select id="client-select" class="portal-client-select">
                        <option>Loading clients...</option>
                    </select>
                    <button class="portal-sync-btn" id="sync-btn" type="button">
                        &#8635; Sync AWS Data
                    </button>
                    <div id="portal-meta"></div>
                    <span id="portal-sync-status"></span>
                </div>

                <!-- Cost section -->
                <div class="portal-section-label" id="cost">&#128176; Cost</div>
                <div id="section-cost"></div>

                <!-- Security section -->
                <div class="portal-section-label" id="security">&#128737; Security</div>
                <div id="section-security"></div>

                <!-- Resources section -->
                <div class="portal-section-label" id="resources">&#9729; Resources</div>
                <div id="section-resources"></div>

                <!-- Insights section -->
                <div class="portal-section-label" id="insights">&#128161; Insights &amp; Recommendations</div>
                <div id="section-insights"></div>

                <p class="portal-refresh-note">Data will refresh daily &middot; dataSource shown next to client selector</p>

            </div>
        </main>
    </div>

    <!-- Load mock data first, then dashboard logic -->
    <script src="../js/mock-data.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        // ── Init ──────────────────────────────────────────────────────────
        // Read ?api= param from URL and save to localStorage (Day 5 step)
        ewsDashboard.initApiFromUrl();

        const clientSelect = document.getElementById('client-select');
        const syncBtn      = document.getElementById('sync-btn');

        const CONTAINER_IDS = {
            cost:      'section-cost',
            security:  'section-security',
            resources: 'section-resources',
            insights:  'section-insights',
            meta:      'portal-meta'
        };

        // Load clients into the dropdown, then load dashboard for the first one
        async function init() {
            await ewsDashboard.loadClients('client-select');
            const firstClient = clientSelect.value;
            if (firstClient) await ewsDashboard.loadDashboard(firstClient, CONTAINER_IDS);
        }

        // Reload dashboard when user picks a different client
        clientSelect.addEventListener('change', async () => {
            await ewsDashboard.loadDashboard(clientSelect.value, CONTAINER_IDS);
        });

        // Sync button
        syncBtn.addEventListener('click', async () => {
            syncBtn.disabled = true;
            syncBtn.textContent = 'Syncing...';
            await ewsDashboard.sync(clientSelect.value, 'portal-sync-status');
            syncBtn.disabled = false;
            syncBtn.textContent = '⟳ Sync AWS Data';
            // Reload dashboard data after sync
            await ewsDashboard.loadDashboard(clientSelect.value, CONTAINER_IDS);
        });

        // Kick everything off
        init();
    </script>
</body>
</html>
